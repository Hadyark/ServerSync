plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

group = 'com.superzanti.serversync'
version = '4.3.0'

application {
    mainClass = 'com.superzanti.serversync.ServerSyncServer'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':build-shared')  // This makes shared classes available to gui

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'

    implementation 'com.eclipsesource.minimal-json:minimal-json:0.9.5'
    implementation 'info.picocli:picocli:4.7.5'
    annotationProcessor 'info.picocli:picocli-codegen:4.7.5'
    implementation fileTree(dir: 'libs', include: '*.jar')
}

jar {
    processResources {
        exclude "css/application.css"
    }

    manifest {
        attributes 'Main-Class': 'com.superzanti.serversync.ServerSyncServer'
        attributes 'Implementation-Version': '4.3.0'
    }
}

// Configure the shadowJar task (with JavaFX)
shadowJar {
    inputs.file(jar.archiveFile)
    archiveClassifier.set('server')

    minimize()

    dependencies {
        exclude 'forge*.jar'
        exclude '**/*javafx*/**' //Comment to build GUI
    }
}

test {
    useJUnitPlatform()
}